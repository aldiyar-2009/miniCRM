<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>Контакты — miniCRM</title>
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/nav.css">
</head>

<body>
    <div class="page">
        <div class="top-bar">
            <div class="page-title">Контакты</div>
            <button class="btn btn-primary" id="btn-add">+ Добавить</button>
        </div>
        <div id="alert"></div>
        <div class="card-table">
            <div id="table-wrap">
                <div class="loading">Загрузка...</div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal">
            <div class="modal-title" id="modal-title">Контакт</div>
            <div id="modal-alert"></div>
            <div class="form-group"><label>Компания</label><select id="f-company">
                    <option value="">— без компании —</option>
                </select></div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
                <div class="form-group"><label>Имя *</label><input type="text" id="f-first" placeholder="Иван"></div>
                <div class="form-group"><label>Фамилия *</label><input type="text" id="f-last" placeholder="Иванов">
                </div>
            </div>
            <div class="form-group"><label>Email</label><input type="email" id="f-email" placeholder="ivan@example.com">
            </div>
            <div class="form-group"><label>Телефон</label><input type="text" id="f-phone"
                    placeholder="+7 777 000 00 00"></div>
            <div class="modal-footer">
                <button class="btn btn-outline" id="btn-cancel">Отмена</button>
                <button class="btn btn-primary" id="btn-save">Сохранить</button>
            </div>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/nav.js"></script>
    <script>
        requireAuth();
        renderNav("contacts");

        let editId = null;

        async function loadCompanies() {
            try {
                const list = await apiFetch("/companies");
                const sel = document.getElementById("f-company");
                list.forEach(c => {
                    const o = document.createElement("option");
                    o.value = c.id; o.textContent = c.name;
                    sel.appendChild(o);
                });
            } catch { }
        }

        async function load() {
            const wrap = document.getElementById("table-wrap");
            try {
                const list = await apiFetch("/contacts");
                if (!list.length) { wrap.innerHTML = '<div class="empty">Контактов нет</div>'; return; }
                wrap.innerHTML =
                    '<table><thead><tr><th>Имя</th><th>Компания</th><th>Email</th><th>Телефон</th><th>Добавлен</th><th></th></tr></thead>' +
                    '<tbody>' + list.map(c =>
                        '<tr>' +
                        '<td><strong>' + c.first_name + ' ' + c.last_name + '</strong></td>' +
                        '<td>' + (c.company_name || '—') + '</td>' +
                        '<td>' + (c.email || '—') + '</td>' +
                        '<td>' + (c.phone || '—') + '</td>' +
                        '<td>' + formatDate(c.created_at) + '</td>' +
                        '<td style="display:flex;gap:6px">' +
                        '<button class="btn btn-outline" style="font-size:12px" onclick=\'openEdit(' + JSON.stringify(c) + ')\'>Ред.</button>' +
                        '<button class="btn btn-danger" style="font-size:12px" onclick="del(\'' + c.id + '\')">✕</button>' +
                        '</td></tr>'
                    ).join("") + '</tbody></table>';
            } catch { wrap.innerHTML = '<div class="empty">Ошибка загрузки</div>'; }
        }

        function openModal(title) {
            document.getElementById("modal-title").textContent = title;
            document.getElementById("modal-alert").innerHTML = "";
            document.getElementById("modal").classList.add("open");
        }

        document.getElementById("btn-add").onclick = () => {
            editId = null;
            ["f-first", "f-last", "f-email", "f-phone"].forEach(id => document.getElementById(id).value = "");
            document.getElementById("f-company").value = "";
            openModal("Новый контакт");
        };

        function openEdit(c) {
            editId = c.id;
            document.getElementById("f-company").value = c.company_id || "";
            document.getElementById("f-first").value = c.first_name || "";
            document.getElementById("f-last").value = c.last_name || "";
            document.getElementById("f-email").value = c.email || "";
            document.getElementById("f-phone").value = c.phone || "";
            openModal("Редактировать контакт");
        }

        document.getElementById("btn-cancel").onclick = () => document.getElementById("modal").classList.remove("open");

        document.getElementById("btn-save").onclick = async () => {
            const body = {
                company_id: document.getElementById("f-company").value || null,
                first_name: document.getElementById("f-first").value,
                last_name: document.getElementById("f-last").value,
                email: document.getElementById("f-email").value || null,
                phone: document.getElementById("f-phone").value || null,
            };
            const ma = document.getElementById("modal-alert");
            try {
                if (editId) {
                    await apiFetch("/contacts/" + editId, { method: "PUT", body: JSON.stringify(body) });
                } else {
                    await apiFetch("/contacts", { method: "POST", body: JSON.stringify(body) });
                }
                document.getElementById("modal").classList.remove("open");
                load();
            } catch (err) {
                const d = err.data?.errors;
                showAlert(ma, Array.isArray(d) ? d.map(e => e.message).join(", ") : err.data?.error || "Ошибка");
            }
        };

        async function del(id) {
            if (!confirm("Удалить контакт?")) return;
            try { await apiFetch("/contacts/" + id, { method: "DELETE" }); load(); }
            catch { showAlert(document.getElementById("alert"), "Не удалось удалить"); }
        }

        loadCompanies();
        load();
    </script>
</body>

</html>

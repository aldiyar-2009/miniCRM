<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>Leads & Calls — miniCRM</title>
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/nav.css">
    <link rel="stylesheet" href="../css/kanban.css">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
</head>

<body>
    <div class="kanban-wrap">
        <div class="kanban-toolbar">
            <div class="kanban-toolbar-left">
                <div class="page-title">Leads & Calls</div>
                <span class="bulk-info" id="bulk-info"></span>
                <button class="btn btn-outline" id="btn-bulk-move" style="display:none">Переместить выбранные</button>
            </div>
            <div class="kanban-toolbar-right">
                <button class="btn btn-outline" id="btn-add-col">+ Столбец</button>
                <button class="btn btn-primary" id="btn-new-call">+ New Call</button>
            </div>
        </div>
        <div id="alert" style="margin-bottom:8px"></div>
        <div class="kanban-board" id="board">
            <div class="loading">Загрузка...</div>
        </div>
    </div>


    <!-- Модалка новой/редакт. карточки — поле компании удалено -->
    <div class="modal-overlay" id="deal-modal">
        <div class="modal" style="width:460px">
            <div class="modal-title" id="deal-modal-title">Новый звонок</div>
            <div id="deal-alert"></div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
                <div class="form-group"><label>Телефон *</label><input type="text" id="f-phone"
                        placeholder="+7 777 000 00 00"></div>
                <div class="form-group"><label>Имя клиента *</label><input type="text" id="f-cname"
                        placeholder="Иван Иванов"></div>
            </div>
            <!-- Компания удалена — берётся автоматически из профиля пользователя -->
            <div class="form-group"><label>Заметки</label><textarea id="f-notes" rows="3"
                    placeholder="Called once, didn't answer."></textarea></div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
                <div class="form-group"><label>Перезвонить</label><input type="datetime-local" id="f-callback"></div>
                <div class="form-group"><label>Назначить</label><select id="f-assigned"></select></div>
            </div>
            <div class="form-group"><label>Столбец *</label><select id="f-column"></select></div>
            <div class="modal-footer">
                <button class="btn btn-outline" id="deal-cancel">Отмена</button>
                <button class="btn btn-primary" id="deal-save">Сохранить</button>
            </div>
        </div>
    </div>

    <!-- Модалка нового столбца -->
    <div class="modal-overlay" id="col-modal">
        <div class="modal" style="width:340px">
            <div class="modal-title">Новый столбец</div>
            <div id="col-alert"></div>
            <div class="form-group"><label>Название</label><input type="text" id="f-col-name" placeholder="New Leads">
            </div>
            <div class="form-group"><label>Цвет заголовка</label><input type="color" id="f-col-color" value="#4361ee">
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" id="col-cancel">Отмена</button>
                <button class="btn btn-primary" id="col-save">Создать</button>
            </div>
        </div>
    </div>

    <!-- Модалка bulk-move -->
    <div class="modal-overlay" id="move-modal">
        <div class="modal" style="width:320px">
            <div class="modal-title">Переместить в столбец</div>
            <div class="form-group"><label>Целевой столбец</label><select id="f-target-col"></select></div>
            <div class="modal-footer">
                <button class="btn btn-outline" id="move-cancel">Отмена</button>
                <button class="btn btn-primary" id="move-confirm">Переместить</button>
            </div>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/nav.js"></script>
    <script src="../js/kanban.js"></script>
</body>

</html>

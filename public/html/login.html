<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>Вход — miniCRM</title>
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/login.css">
</head>

<body>
    <div class="login-box">
        <div class="login-brand">miniCRM</div>
        <div class="login-sub">Система управления звонками</div>
        <div class="login-tabs">
            <button class="login-tab active" data-tab="login">Вход</button>
            <button class="login-tab" data-tab="register">Регистрация</button>
        </div>
        <div id="alert"></div>
        <form class="login-form active" id="login-form">
            <div class="form-group"><label>Email</label><input type="email" id="l-email" placeholder="you@example.com">
            </div>
            <div class="form-group"><label>Пароль</label><input type="password" id="l-pass" placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary">Войти</button>
        </form>
        <form class="login-form" id="register-form">
            <div class="form-group"><label>Имя</label><input type="text" id="r-name" placeholder="Иван Иванов"></div>
            <div class="form-group"><label>Email</label><input type="email" id="r-email" placeholder="you@example.com">
            </div>
            <div class="form-group"><label>Пароль</label><input type="password" id="r-pass"
                    placeholder="мин. 8 символов"></div>
            <button type="submit" class="btn btn-primary">Зарегистрироваться</button>
        </form>
    </div>
    <script src="../js/api.js"></script>
    <script>
        if (getToken()) window.location.href = "/html/kanban.html";
        const alertEl = document.getElementById("alert");

        document.querySelectorAll(".login-tab").forEach(tab => {
            tab.addEventListener("click", () => {
                document.querySelectorAll(".login-tab").forEach(t => t.classList.remove("active"));
                document.querySelectorAll(".login-form").forEach(f => f.classList.remove("active"));
                tab.classList.add("active");
                document.getElementById(tab.dataset.tab + "-form").classList.add("active");
                alertEl.innerHTML = "";
            });
        });

        document.getElementById("login-form").addEventListener("submit", async e => {
            e.preventDefault(); alertEl.innerHTML = "";
            try {
                const data = await apiFetch("/users/login", {
                    method: "POST",
                    body: JSON.stringify({ email: document.getElementById("l-email").value, password: document.getElementById("l-pass").value })
                });
                setTokens(data.accessToken, data.refreshToken);
                localStorage.setItem("crm_user", JSON.stringify(data.user));
                window.location.href = "/html/kanban.html";
            } catch (err) {
                showAlert(alertEl, err.data?.error || err.data?.message || "Ошибка входа");
            }
        });

        document.getElementById("register-form").addEventListener("submit", async e => {
            e.preventDefault(); alertEl.innerHTML = "";
            try {
                await apiFetch("/users/register", {
                    method: "POST",
                    body: JSON.stringify({ name: document.getElementById("r-name").value, email: document.getElementById("r-email").value, password: document.getElementById("r-pass").value, role: "manager" })
                });
                showAlert(alertEl, "Аккаунт создан. Войдите.", "success");
                document.querySelector('[data-tab="login"]').click();
            } catch (err) {
                const d = err.data?.errors;
                showAlert(alertEl, Array.isArray(d) ? d.map(e => e.message).join(", ") : err.data?.error || "Ошибка");
            }
        });
    </script>
</body>

</html>

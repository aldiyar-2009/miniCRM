<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>miniCRM</title>
    <link rel="stylesheet" href="../css/style.css">

    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.2.1/css/bootstrap.min.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>

<body>
    <header class="site-nav">
        <div class="nav-links">
            <a href="/public/html/admin.html">Админка</a>
            <a href="/public/html/login.html">Войти</a>
        </div>
        <div class="nav-right">miniCRM</div>
    </header>
    <div id="login-container"
        style="display: none; max-width: 400px; margin: 50px auto; padding: 20px; border: 1px solid #ccc; border-radius: 4px; background: #fff;">

        <div style="display: flex; margin-bottom: 20px;">
            <button id="tab-login"
                style="flex: 1; border-radius: 4px 0 0 4px; background-color: #3498db; color: white; border-color: #2980b9;">Вход</button>
            <button id="tab-register" style="flex: 1; border-radius: 0 4px 4px 0;">Регистрация</button>
        </div>

        <div id="form-login">
            <div class="form-field">
                <label>Электронная почта:</label>
                <input id="inp-login-email" type="text" placeholder="ivan@example.com" />
                <span id="error-login-email" class="error-text"></span>
            </div>
            <div class="form-field">
                <label>Пароль:</label>
                <input id="inp-login-password" type="password" placeholder="Введите пароль" />
                <span id="error-login-password" class="error-text"></span>
            </div>
            <button id="btn-login"
                style="width: 100%; background-color: #2ecc71; color: white; border-color: #27ae60;">Войти</button>
        </div>

        <div id="form-register" style="display: none;">
            <div class="form-field">
                <label>Имя:</label>
                <input id="inp-register-name" type="text" placeholder="Введите ваше имя" />
                <span id="error-register-name" class="error-text"></span>
            </div>
            <div class="form-field">
                <label>Электронная почта:</label>
                <input id="inp-register-email" type="text" placeholder="ivan@example.com" />
                <span id="error-register-email" class="error-text"></span>
            </div>
            <div class="form-field">
                <label>Пароль:</label>
                <input id="inp-register-password" type="password" placeholder="Минимум 3 символа" />
                <span id="error-register-password" class="error-text"></span>
            </div>
            <button id="btn-register"
                style="width: 100%; background-color: #3498db; color: white; border-color: #2980b9;">Зарегистрироваться</button>
        </div>

    </div>


    <div id="crm-dashboard" style="display: none; max-width: 600px; margin: 30px auto;">
        <div class="panel-card">
            <div class="panel-header">
                <div>
                    <h2>Вы вошли</h2>
                    <p class="text-muted">Авторизация прошла успешно. Перейдите в админку.</p>
                    <p id="token-wrapper" style="word-break:break-all; margin-top:8px;">
                        <strong>JWT:</strong>
                        <span id="token-display" class="token-text"></span>
                        <button id="btn-copy-token" class="btn small copy-btn"
                            style="margin-left:8px;">Копировать</button>
                    </p>
                </div>
                <button id="btn-logout" class="cancel-btn" style="margin-bottom: 0;">Выйти</button>
            </div>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/errors.js"></script>
    <script src="../js/auth.js"></script>
</body>

</html>

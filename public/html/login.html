<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <title>Вход — miniCRM</title>
  <link rel="stylesheet" href="/minicrm-out/public/css/base.css">
  <link rel="stylesheet" href="/minicrm-out/public/css/login.css">
</head>

<body>
  <div class="auth-box">
    <div class="auth-title">miniCRM</div>
    <div class="auth-subtitle">Система управления клиентами</div>

    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="login">Вход</button>
      <button class="auth-tab" data-tab="register">Регистрация</button>
    </div>

    <div id="alert"></div>

    <form class="auth-form active" id="login-form">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label>Пароль</label>
        <input type="password" id="login-password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary">Войти</button>
    </form>

    <form class="auth-form" id="register-form">
      <div class="form-group">
        <label>Имя</label>
        <input type="text" id="reg-name" placeholder="Иван Иванов" required>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label>Пароль (мин. 8 символов)</label>
        <input type="password" id="reg-password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary">Зарегистрироваться</button>
    </form>
  </div>

  <script src="/minicrm-out/public/js/api.js"></script>
  <script>
    // Redirect if already logged in
    if (getToken()) window.location.href = "/minicrm-out/public/html/dashboard.html";

    const alert = document.getElementById("alert");

    // Tabs
    document.querySelectorAll(".auth-tab").forEach(tab => {
      tab.addEventListener("click", () => {
        document.querySelectorAll(".auth-tab").forEach(t => t.classList.remove("active"));
        document.querySelectorAll(".auth-form").forEach(f => f.classList.remove("active"));
        tab.classList.add("active");
        document.getElementById(tab.dataset.tab + "-form").classList.add("active");
        alert.innerHTML = "";
      });
    });

    // Login
    document.getElementById("login-form").addEventListener("submit", async e => {
      e.preventDefault();
      alert.innerHTML = "";
      const email = document.getElementById("login-email").value;
      const password = document.getElementById("login-password").value;
      try {
        const data = await apiFetch("/users/login", {
          method: "POST",
          body: JSON.stringify({ email, password }),
        });
        setTokens(data.accessToken, data.refreshToken);
        localStorage.setItem("user", JSON.stringify(data.user));
        window.location.href = "/minicrm-out/public/html/dashboard.html";
      } catch (err) {
        const msg = err.data?.errors || err.data?.error || err.data?.message || "Ошибка входа";
        showAlert(alert, msg);
      }
    });

    // Register
    document.getElementById("register-form").addEventListener("submit", async e => {
      e.preventDefault();
      alert.innerHTML = "";
      const name = document.getElementById("reg-name").value;
      const email = document.getElementById("reg-email").value;
      const password = document.getElementById("reg-password").value;
      try {
        await apiFetch("/users/register", {
          method: "POST",
          body: JSON.stringify({ name, email, password, role: "viewer" }),
        });
        showAlert(alert, "Аккаунт создан. Войдите.", "success");
        document.querySelector('[data-tab="login"]').click();
      } catch (err) {
        const details = err.data?.errors;
        const msg = Array.isArray(details)
          ? details.map(d => d.message).join(", ")
          : err.data?.error || err.data?.message || "Ошибка регистрации";
        showAlert(alert, msg);
      }
    });
  </script>
</body>

</html>

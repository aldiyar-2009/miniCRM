<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Ассистент</title>
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/nav.css" />
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/nav.js"></script>
  <script defer src="../js/AiChat.js"></script>
  <style>
    body {
      background: #f5f7fb;
      padding-top: var(--nav-height, 0);
    }

    main {
      display: flex;
      gap: 1rem;
      padding: calc(var(--nav-height, 70px) + 1rem) 1rem 2rem;
      min-height: calc(100vh - var(--nav-height, 0));
    }

    .sessions-panel {
      width: 260px;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 1rem;
      flex-shrink: 0;
    }

    .sessions-panel h2 {
      font-size: 1rem;
      margin-bottom: 0.75rem;
    }

    #btn-new-session {
      width: 100%;
      margin-bottom: 1rem;
      padding: 0.6rem;
      border: none;
      border-radius: 8px;
      background: #3b82f6;
      color: #fff;
      cursor: pointer;
    }

    #session-list {
      list-style: none;
      padding: 0;
      margin: 0;
      max-height: 70vh;
      overflow-y: auto;
    }

    #session-list li {
      padding: 0.6rem 0.75rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      margin-bottom: 0.25rem;
    }

    #session-list li:hover {
      background: #f1f5f9;
    }

    #session-list li.active {
      background: #dbeafe;
      color: #1e40af;
    }

    .chat-panel {
      flex: 1;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 1rem;
      display: flex;
      flex-direction: column;
    }

    #ai-chat-display {
      flex: 1;
      min-height: 300px;
      overflow-y: auto;
      padding: 1rem;
      background: #f8fafc;
      border-radius: 12px;
      margin-bottom: 1rem;
    }

    .ai-message {
      margin-bottom: 0.75rem;
      padding: 0.75rem 1rem;
      border-radius: 12px;
      line-height: 1.5;
    }

    .user-question {
      background: #fff;
      border: 1px solid #e2e8f0;
      text-align: right;
    }

    .ai-response {
      background: #eff6ff;
      color: #1e3a8a;
    }

    #ai-chat-form textarea {
      width: 100%;
      min-height: 80px;
      padding: 0.75rem;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      margin-bottom: 0.5rem;
    }

    #ai-chat-form input {
      width: 100%;
      padding: 0.6rem;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      margin-bottom: 0.5rem;
    }

    #ai-chat-form button {
      padding: 0.6rem 1.5rem;
      border: none;
      border-radius: 8px;
      background: #3b82f6;
      color: #fff;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <main>
    <aside class="sessions-panel">
      <h2>Диалоги</h2>
      <button id="btn-new-session" type="button">+ Новый диалог</button>
      <ul id="session-list"></ul>
    </aside>

    <section class="chat-panel">
      <h1>AI Ассистент</h1>

      <div id="ai-chat-display"></div>

      <form id="ai-chat-form">
        <textarea id="userMessage" placeholder="Напишите вопрос..." required></textarea>
        <input id="crmDealId" type="text" placeholder="ID сделки (опционально)" />
        <button type="submit">Отправить</button>
      </form>
    </section>
  </main>

  <script>
    requireAuth();
    renderNav("aichat");
  </script>
</body>

</html>

<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <title>Активности — miniCRM</title>
  <link rel="stylesheet" href="/minicrm-out/public/css/base.css">
</head>

<body>
  <div class="page">
    <div class="top-bar">
      <div class="page-title">Активности</div>
      <button class="btn btn-primary" id="btn-add">+ Добавить</button>
    </div>
    <div id="alert"></div>

    <div class="card" style="margin-bottom:16px">
      <div style="display:flex;align-items:center;gap:10px;font-size:13px">
        <label>Сделка:</label>
        <select id="deal-filter"
          style="border:1px solid var(--border);border-radius:4px;padding:5px 8px;font-size:13px;font-family:inherit"></select>
        <button class="btn btn-outline" id="btn-load">Загрузить</button>
      </div>
    </div>

    <div class="card">
      <div id="table-wrap">
        <div class="empty">Выберите сделку</div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="modal-title">Новая активность</div>
      <div id="modal-alert"></div>
      <div class="form-group">
        <label>Сделка</label>
        <select id="f-deal"></select>
      </div>
      <div class="form-group">
        <label>Тип</label>
        <select id="f-type">
          <option value="call">Звонок</option>
          <option value="email">Письмо</option>
          <option value="task">Задача</option>
          <option value="meeting">Встреча</option>
        </select>
      </div>
      <div class="form-group">
        <label>Описание</label>
        <textarea id="f-notes" rows="3" style="resize:vertical"></textarea>
      </div>
      <div class="form-group">
        <label>Дата</label>
        <input type="datetime-local" id="f-date">
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" id="btn-cancel">Отмена</button>
        <button class="btn btn-primary" id="btn-save">Сохранить</button>
      </div>
    </div>
  </div>

  <script src="/minicrm-out/public/js/api.js"></script>
  <script src="/minicrm-out/public/js/nav.js"></script>
  <script>
    requireAuth();
    renderNav("activities");

    let deals = [];

    async function loadDeals() {
      try {
        deals = await apiFetch("/deals");
        const opts = deals.map(d => '<option value="' + d.id + '">' + d.title + '</option>').join("");
        document.getElementById("deal-filter").innerHTML = '<option value="">— выберите —</option>' + opts;
        document.getElementById("f-deal").innerHTML = opts;
      } catch { }
    }

    async function loadActivities() {
      const dealId = document.getElementById("deal-filter").value;
      if (!dealId) return;
      const wrap = document.getElementById("table-wrap");
      wrap.innerHTML = '<div class="loading">Загрузка...</div>';
      try {
        const list = await apiFetch("/deals/" + dealId + "/activities");
        if (!list.length) { wrap.innerHTML = '<div class="empty">Активностей нет</div>'; return; }
        const typeLabel = { call: "Звонок", email: "Письмо", task: "Задача", meeting: "Встреча" };
        wrap.innerHTML =
          '<table><thead><tr><th>Тип</th><th>Описание</th><th>Дата</th></tr></thead>' +
          '<tbody>' + list.map(a =>
            '<tr>' +
            '<td>' + (typeLabel[a.type] || a.type) + '</td>' +
            '<td>' + (a.notes || "—") + '</td>' +
            '<td>' + formatDate(a.activity_date) + '</td>' +
            '</tr>'
          ).join("") + '</tbody></table>';
      } catch (e) {
        wrap.innerHTML = '<div class="empty">Ошибка загрузки</div>';
      }
    }

    document.getElementById("btn-load").onclick = loadActivities;

    document.getElementById("btn-add").onclick = () => {
      document.getElementById("modal-alert").innerHTML = "";
      document.getElementById("f-notes").value = "";
      document.getElementById("f-date").value = "";
      document.getElementById("modal").classList.add("open");
    };
    document.getElementById("btn-cancel").onclick = () => document.getElementById("modal").classList.remove("open");

    document.getElementById("btn-save").onclick = async () => {
      const body = {
        deal_id: document.getElementById("f-deal").value,
        type: document.getElementById("f-type").value,
        notes: document.getElementById("f-notes").value || null,
        activity_date: document.getElementById("f-date").value || null,
      };
      const ma = document.getElementById("modal-alert");
      try {
        await apiFetch("/activities", { method: "POST", body: JSON.stringify(body) });
        document.getElementById("modal").classList.remove("open");
        loadActivities();
      } catch (err) {
        const details = err.data?.errors;
        const msg = Array.isArray(details) ? details.map(d => d.message).join(", ") : err.data?.error || "Ошибка";
        showAlert(ma, msg);
      }
    };

    loadDeals();
  </script>
</body>

</html>

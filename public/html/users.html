<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>Пользователи — miniCRM</title>
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/nav.css">
</head>

<body>
    <div class="page">
        <div class="top-bar">
            <div class="page-title">Пользователи</div>
        </div>
        <div id="alert"></div>
        <div class="card-table">
            <div id="table-wrap">
                <div class="loading">Загрузка...</div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal">
            <div class="modal-title">Редактировать пользователя</div>
            <div id="modal-alert"></div>
            <div class="form-group"><label>Имя</label><input type="text" id="f-name"></div>
            <div class="form-group"><label>Email</label><input type="email" id="f-email"></div>
            <div class="form-group">
                <label>Роль</label>
                <select id="f-role">
                    <option value="manager">manager</option>
                    <option value="admin">admin</option>
                    <option value="viewer">viewer</option>
                </select>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" id="btn-cancel">Отмена</button>
                <button class="btn btn-primary" id="btn-save">Сохранить</button>
            </div>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/nav.js"></script>
    <script>
        requireAuth();
        const me = getUser();
        if (me?.role !== "admin") window.location.href = "./html/kanban.html";
        renderNav("users");

        let editId = null;

        const ROLE_BADGE = {
            admin: "badge-red",
            manager: "badge-blue",
            viewer: "badge-gray",
        };

        async function load() {
            const wrap = document.getElementById("table-wrap");
            try {
                const list = await apiFetch("/users");
                if (!list.length) { wrap.innerHTML = '<div class="empty">Пользователей нет</div>'; return; }
                wrap.innerHTML =
                    '<table><thead><tr><th>Имя</th><th>Email</th><th>Роль</th><th>Создан</th><th></th></tr></thead>' +
                    '<tbody>' + list.map(u =>
                        '<tr>' +
                        '<td><strong>' + u.name + '</strong></td>' +
                        '<td>' + u.email + '</td>' +
                        '<td><span class="badge ' + (ROLE_BADGE[u.role] || "badge-gray") + '">' + u.role + '</span></td>' +
                        '<td>' + formatDate(u.created_at) + '</td>' +
                        '<td style="display:flex;gap:6px">' +
                        '<button class="btn btn-outline" style="font-size:12px" onclick=\'openEdit(' + JSON.stringify(u) + ')\'>Ред.</button>' +
                        (u.id !== me.id
                            ? '<button class="btn btn-danger" style="font-size:12px" onclick="del(\'' + u.id + '\')">✕</button>'
                            : '<span style="font-size:11px;color:var(--text-muted);padding:0 4px">вы</span>') +
                        '</td></tr>'
                    ).join("") + '</tbody></table>';
            } catch { wrap.innerHTML = '<div class="empty">Ошибка загрузки</div>'; }
        }

        function openEdit(u) {
            editId = u.id;
            document.getElementById("f-name").value = u.name;
            document.getElementById("f-email").value = u.email;
            document.getElementById("f-role").value = u.role;
            document.getElementById("modal-alert").innerHTML = "";
            document.getElementById("modal").classList.add("open");
        }

        document.getElementById("btn-cancel").onclick = () => document.getElementById("modal").classList.remove("open");

        document.getElementById("btn-save").onclick = async () => {
            const body = {
                name: document.getElementById("f-name").value,
                email: document.getElementById("f-email").value,
                role: document.getElementById("f-role").value,
            };
            const ma = document.getElementById("modal-alert");
            try {
                await apiFetch("/users/" + editId, { method: "PUT", body: JSON.stringify(body) });
                document.getElementById("modal").classList.remove("open");
                load();
            } catch (err) {
                const d = err.data?.errors;
                showAlert(ma, Array.isArray(d) ? d.map(e => e.message).join(", ") : err.data?.error || "Ошибка");
            }
        };

        async function del(id) {
            if (!confirm("Удалить пользователя?")) return;
            try { await apiFetch("/users/" + id, { method: "DELETE" }); load(); }
            catch { showAlert(document.getElementById("alert"), "Не удалось удалить"); }
        }

        load();
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <title>Пользователи — miniCRM</title>
  <link rel="stylesheet" href="/minicrm-out/public/css/base.css">
</head>

<body>
  <div class="page">
    <div class="top-bar">
      <div class="page-title">Пользователи</div>
    </div>
    <div id="alert"></div>
    <div class="card">
      <div id="table-wrap">
        <div class="loading">Загрузка...</div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="modal-title">Редактировать пользователя</div>
      <div id="modal-alert"></div>
      <div class="form-group">
        <label>Имя</label>
        <input type="text" id="f-name">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="f-email">
      </div>
      <div class="form-group">
        <label>Роль</label>
        <select id="f-role">
          <option value="viewer">viewer</option>
          <option value="manager">manager</option>
          <option value="admin">admin</option>
        </select>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" id="btn-cancel">Отмена</button>
        <button class="btn btn-primary" id="btn-save">Сохранить</button>
      </div>
    </div>
  </div>

  <script src="/minicrm-out/public/js/api.js"></script>
  <script src="/minicrm-out/public/js/nav.js"></script>
  <script>
    requireAuth();
    const me = getUser();
    if (!me || me.role !== "admin") window.location.href = "/minicrm-out/public/html/dashboard.html";
    renderNav("users");

    let editId = null;

    async function loadTable() {
      const wrap = document.getElementById("table-wrap");
      try {
        const list = await apiFetch("/users");
        if (!list.length) { wrap.innerHTML = '<div class="empty">Пользователи не найдены</div>'; return; }
        wrap.innerHTML =
          '<table><thead><tr><th>Имя</th><th>Email</th><th>Роль</th><th>Создан</th><th></th></tr></thead>' +
          '<tbody>' + list.map(u =>
            '<tr>' +
            '<td>' + u.name + '</td>' +
            '<td>' + u.email + '</td>' +
            '<td>' + u.role + '</td>' +
            '<td>' + formatDate(u.created_at) + '</td>' +
            '<td class="td-actions">' +
            '<button class="btn btn-outline" onclick="openEdit(' + JSON.stringify(u).replace(/"/g, '&quot;') + ')">Ред.</button>' +
            '<button class="btn btn-danger" onclick="del(\'' + u.id + '\')">Удалить</button>' +
            '</td></tr>'
          ).join("") + '</tbody></table>';
      } catch (e) {
        wrap.innerHTML = '<div class="empty">Ошибка загрузки</div>';
      }
    }

    function openEdit(u) {
      editId = u.id;
      document.getElementById("f-name").value = u.name;
      document.getElementById("f-email").value = u.email;
      document.getElementById("f-role").value = u.role;
      document.getElementById("modal-alert").innerHTML = "";
      document.getElementById("modal").classList.add("open");
    }

    document.getElementById("btn-cancel").onclick = () => document.getElementById("modal").classList.remove("open");

    document.getElementById("btn-save").onclick = async () => {
      const body = {
        name: document.getElementById("f-name").value,
        email: document.getElementById("f-email").value,
        role: document.getElementById("f-role").value,
      };
      const ma = document.getElementById("modal-alert");
      try {
        await apiFetch("/users/" + editId, { method: "PUT", body: JSON.stringify(body) });
        document.getElementById("modal").classList.remove("open");
        loadTable();
      } catch (err) {
        const details = err.data?.errors;
        const msg = Array.isArray(details) ? details.map(d => d.message).join(", ") : err.data?.error || "Ошибка";
        showAlert(ma, msg);
      }
    };

    async function del(id) {
      if (id === me?.id) { alert("Нельзя удалить себя"); return; }
      if (!confirm("Удалить пользователя?")) return;
      try {
        await apiFetch("/users/" + id, { method: "DELETE" });
        loadTable();
      } catch (e) {
        showAlert(document.getElementById("alert"), "Не удалось удалить");
      }
    }

    loadTable();
  </script>
</body>

</html>

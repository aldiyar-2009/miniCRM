<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <title>Сделки — miniCRM</title>
  <link rel="stylesheet" href="/minicrm-out/public/css/base.css">
</head>

<body>
  <div class="page">
    <div class="top-bar">
      <div class="page-title">Сделки</div>
      <button class="btn btn-primary" id="btn-add">+ Добавить</button>
    </div>
    <div id="alert"></div>
    <div class="card">
      <div id="table-wrap">
        <div class="loading">Загрузка...</div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="modal-title" id="modal-title">Сделка</div>
      <div id="modal-alert"></div>
      <div class="form-group">
        <label>Название</label>
        <input type="text" id="f-title">
      </div>
      <div class="form-group">
        <label>Компания</label>
        <select id="f-company"></select>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Сумма</label>
          <input type="number" id="f-amount" min="0" step="0.01">
        </div>
        <div class="form-group">
          <label>Валюта</label>
          <select id="f-currency">
            <option>USD</option>
            <option>EUR</option>
            <option>RUB</option>
            <option>KZT</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Стадия</label>
        <select id="f-stage">
          <option value="lead">Lead</option>
          <option value="qualified">Qualified</option>
          <option value="proposal">Proposal</option>
          <option value="negotiation">Negotiation</option>
          <option value="won">Won</option>
          <option value="lost">Lost</option>
        </select>
      </div>
      <div class="form-group">
        <label>Дата закрытия</label>
        <input type="date" id="f-close-date">
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" id="btn-cancel">Отмена</button>
        <button class="btn btn-primary" id="btn-save">Сохранить</button>
      </div>
    </div>
  </div>

  <script src="/minicrm-out/public/js/api.js"></script>
  <script src="/minicrm-out/public/js/nav.js"></script>
  <script>
    requireAuth();
    renderNav("deals");

    let editId = null;
    const user = getUser();

    async function loadSelects() {
      try {
        const companies = await apiFetch("/companies");
        const sel = document.getElementById("f-company");
        sel.innerHTML = companies.map(c => '<option value="' + c.id + '">' + c.name + '</option>').join("");
      } catch { }
    }

    async function loadTable() {
      const wrap = document.getElementById("table-wrap");
      try {
        const list = await apiFetch("/deals");
        if (!list.length) { wrap.innerHTML = '<div class="empty">Сделки не найдены</div>'; return; }
        wrap.innerHTML =
          '<table><thead><tr><th>Название</th><th>Компания</th><th>Сумма</th><th>Стадия</th><th>Закрытие</th><th></th></tr></thead>' +
          '<tbody>' + list.map(d =>
            '<tr>' +
            '<td><strong>' + d.title + '</strong></td>' +
            '<td>' + (d.company_name || "—") + '</td>' +
            '<td>' + (d.amount != null ? d.amount + ' ' + (d.currency || "USD") : "—") + '</td>' +
            '<td><span class="badge badge-' + d.stage + '">' + d.stage + '</span></td>' +
            '<td>' + formatDate(d.close_date) + '</td>' +
            '<td class="td-actions">' +
            '<button class="btn btn-outline" onclick="openEdit(' + JSON.stringify(d).replace(/"/g, '&quot;') + ')">Ред.</button>' +
            '<button class="btn btn-danger" onclick="del(\'' + d.id + '\')">Удалить</button>' +
            '</td></tr>'
          ).join("") + '</tbody></table>';
      } catch (e) {
        wrap.innerHTML = '<div class="empty">Ошибка загрузки</div>';
      }
    }

    function openModal(title) {
      document.getElementById("modal-title").textContent = title;
      document.getElementById("modal-alert").innerHTML = "";
      document.getElementById("modal").classList.add("open");
    }

    document.getElementById("btn-add").onclick = () => {
      editId = null;
      document.getElementById("f-title").value = "";
      document.getElementById("f-amount").value = "";
      document.getElementById("f-stage").value = "lead";
      document.getElementById("f-close-date").value = "";
      openModal("Новая сделка");
    };

    function openEdit(d) {
      editId = d.id;
      document.getElementById("f-title").value = d.title;
      document.getElementById("f-company").value = d.company_id;
      document.getElementById("f-amount").value = d.amount || "";
      document.getElementById("f-currency").value = d.currency || "USD";
      document.getElementById("f-stage").value = d.stage;
      document.getElementById("f-close-date").value = d.close_date ? d.close_date.split("T")[0] : "";
      openModal("Редактировать сделку");
    }

    document.getElementById("btn-cancel").onclick = () => document.getElementById("modal").classList.remove("open");

    document.getElementById("btn-save").onclick = async () => {
      const body = {
        title: document.getElementById("f-title").value,
        company_id: document.getElementById("f-company").value,
        owner_id: user?.id,
        amount: parseFloat(document.getElementById("f-amount").value) || null,
        currency: document.getElementById("f-currency").value,
        stage: document.getElementById("f-stage").value,
        close_date: document.getElementById("f-close-date").value || null,
      };
      const ma = document.getElementById("modal-alert");
      try {
        if (editId) {
          await apiFetch("/deals/" + editId, { method: "PUT", body: JSON.stringify(body) });
        } else {
          await apiFetch("/deals", { method: "POST", body: JSON.stringify(body) });
        }
        document.getElementById("modal").classList.remove("open");
        loadTable();
      } catch (err) {
        const details = err.data?.errors;
        const msg = Array.isArray(details) ? details.map(d => d.message).join(", ") : err.data?.error || "Ошибка";
        showAlert(ma, msg);
      }
    };

    async function del(id) {
      if (!confirm("Удалить сделку?")) return;
      try {
        await apiFetch("/deals/" + id, { method: "DELETE" });
        loadTable();
      } catch (e) {
        showAlert(document.getElementById("alert"), "Не удалось удалить");
      }
    }

    loadSelects();
    loadTable();
  </script>
</body>

</html>

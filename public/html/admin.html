<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../css/style.css">

    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.2.1/css/bootstrap.min.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>

<body>
    <header class="site-nav">
        <div class="nav-links">
            <a href="/public/html/admin.html">Админка</a>
            <a href="/public/html/login.html">Войти</a>
        </div>
        <div class="nav-right">miniCRM</div>
    </header>

    <div class="panel-card">
        <div class="panel-header">
            <div>
                <h1>Админ-панель</h1>
                <p>Управление компаниями и контактами CRM.</p>
            </div>
            <div>
                <span id="auth-status">Токен для контактов: проверка...</span>
            </div>
        </div>

        <div class="row">
            <div class="col panel-card">
                <div class="panel-header">
                    <div>
                        <h2>Компании</h2>
                        <p class="text-muted">Добавляйте, редактируйте и удаляйте компании.</p>
                    </div>
                </div>

                <div class="form-field">
                    <label>Название компании</label>
                    <input id="inp-name" type="text" placeholder="Напр. Яндекс" />
                    <span id="error-name" class="error-text"></span>
                </div>

                <div class="form-field">
                    <label>Отрасль</label>
                    <input id="inp-industry" type="text" placeholder="Напр. IT" />
                    <span id="error-industry" class="error-text"></span>
                </div>

                <div class="form-field">
                    <label>Сайт</label>
                    <input id="inp-website" type="text" placeholder="Напр. https://yandex.ru" />
                    <span id="error-website" class="error-text"></span>
                </div>

                <div class="form-actions">
                    <button id="btn-create-company">Сохранить компанию</button>
                    <button id="btn-cancel-company" class="cancel-btn hidden">Отменить</button>
                    <button id="btn-load-companies" class="save-btn">Обновить список</button>
                </div>

                <div class="list-container" id="companies-list">
                    <p>Загрузка...</p>
                </div>
            </div>

            <div class="col panel-card">
                <div class="panel-header">
                    <div>
                        <h2>Контакты</h2>
                        <p class="text-muted">Создавайте и редактируйте контакты для выбранной компании.</p>
                    </div>
                </div>

                <div class="form-field">
                    <label>Компания</label>
                    <select id="select-company_id">
                        <option value="">-- Выберите компанию --</option>
                    </select>
                    <span id="error-company_id" class="error-text"></span>
                </div>

                <div class="form-field">
                    <label>Имя</label>
                    <input id="inp-first_name" type="text" placeholder="Напр. Иван" />
                    <span id="error-first_name" class="error-text"></span>
                </div>

                <div class="form-field">
                    <label>Фамилия</label>
                    <input id="inp-last_name" type="text" placeholder="Напр. Иванов" />
                    <span id="error-last_name" class="error-text"></span>
                </div>

                <div class="form-field">
                    <label>Email</label>
                    <input id="inp-email" type="text" placeholder="Напр. ivan@example.com" />
                    <span id="error-email" class="error-text"></span>
                </div>

                <div class="form-field">
                    <label>Телефон</label>
                    <input id="inp-phone" type="text" placeholder="Напр. +79998887766" />
                    <span id="error-phone" class="error-text"></span>
                </div>

                <div class="form-actions">
                    <button id="btn-create-contact">Сохранить контакт</button>
                    <button id="btn-cancel-contact" class="cancel-btn hidden">Отменить</button>
                    <button id="btn-load-contacts" class="save-btn">Обновить список</button>
                </div>

                <div class="list-container" id="contacts-list">
                    <p>Загрузка...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/errors.js"></script>
    <script src="../js/companies.js"></script>
    <script src="../js/contacts.js"></script>
    <script src="../js/auth.js"></script>
</body>

</html>

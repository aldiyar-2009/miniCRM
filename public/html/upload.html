<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <title>Файлы — miniCRM</title>
  <link rel="stylesheet" href="/minicrm-out/public/css/base.css">
  <link rel="stylesheet" href="/minicrm-out/public/css/upload.css">
</head>

<body>
  <div class="page">
    <div class="page-title">Загрузка файлов</div>
    <div id="alert"></div>

    <div class="card" style="max-width:560px">
      <div class="upload-area" id="drop-area">
        <span class="icon">📂</span>
        <strong>Нажмите или перетащите файл</strong>
        <p>Максимальный размер: 2 МБ</p>
      </div>
      <input type="file" id="file-input" name="image">

      <div class="progress-wrap" id="progress-wrap">
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" id="progress-bar"></div>
        </div>
        <div class="progress-text" id="progress-text">0%</div>
      </div>

      <button class="btn btn-primary" id="btn-upload" disabled>Загрузить</button>

      <div class="file-list" id="file-list" style="margin-top:20px"></div>
    </div>
  </div>

  <script src="/minicrm-out/public/js/api.js"></script>
  <script src="/minicrm-out/public/js/nav.js"></script>
  <script>
    requireAuth();
    renderNav("upload");

    const dropArea = document.getElementById("drop-area");
    const fileInput = document.getElementById("file-input");
    const btnUpload = document.getElementById("btn-upload");
    const progressWrap = document.getElementById("progress-wrap");
    const progressBar = document.getElementById("progress-bar");
    const progressText = document.getElementById("progress-text");
    const fileList = document.getElementById("file-list");
    const alert = document.getElementById("alert");
    let selectedFile = null;

    dropArea.addEventListener("click", () => fileInput.click());

    dropArea.addEventListener("dragover", e => { e.preventDefault(); dropArea.classList.add("drag-over"); });
    dropArea.addEventListener("dragleave", () => dropArea.classList.remove("drag-over"));
    dropArea.addEventListener("drop", e => {
      e.preventDefault();
      dropArea.classList.remove("drag-over");
      const file = e.dataTransfer.files[0];
      if (file) setFile(file);
    });

    fileInput.addEventListener("change", () => {
      if (fileInput.files[0]) setFile(fileInput.files[0]);
    });

    function setFile(file) {
      if (file.size > 2 * 1024 * 1024) {
        showAlert(alert, "Файл слишком большой (макс. 2 МБ)");
        return;
      }
      selectedFile = file;
      dropArea.querySelector("strong").textContent = file.name;
      dropArea.querySelector("p").textContent = (file.size / 1024).toFixed(1) + " KB";
      btnUpload.disabled = false;
      alert.innerHTML = "";
    }

    btnUpload.addEventListener("click", () => {
      if (!selectedFile) return;

      const formData = new FormData();
      formData.append("image", selectedFile);

      const xhr = new XMLHttpRequest();

      xhr.upload.addEventListener("progress", e => {
        if (e.lengthComputable) {
          const pct = Math.round(e.loaded / e.total * 100);
          progressBar.style.width = pct + "%";
          progressText.textContent = pct + "%";
        }
      });

      progressWrap.style.display = "block";
      progressBar.style.width = "0%";
      progressText.textContent = "0%";
      btnUpload.disabled = true;

      xhr.addEventListener("load", () => {
        if (xhr.status === 200) {
          const data = JSON.parse(xhr.responseText);
          showAlert(alert, "Файл загружен!", "success");
          addFileItem(data.filename, data.downloadLink);
          // Reset
          selectedFile = null;
          dropArea.querySelector("strong").textContent = "Нажмите или перетащите файл";
          dropArea.querySelector("p").textContent = "Максимальный размер: 2 МБ";
          fileInput.value = "";
          setTimeout(() => { progressWrap.style.display = "none"; }, 1000);
        } else {
          showAlert(alert, "Ошибка загрузки");
          progressWrap.style.display = "none";
          btnUpload.disabled = false;
        }
      });

      xhr.addEventListener("error", () => {
        showAlert(alert, "Ошибка сети");
        progressWrap.style.display = "none";
        btnUpload.disabled = false;
      });

      xhr.open("POST", "/upload");
      const token = getToken();
      if (token) xhr.setRequestHeader("Authorization", "Bearer " + token);
      xhr.send(formData);
    });

    function addFileItem(name, link) {
      const item = document.createElement("div");
      item.className = "file-item";
      item.innerHTML =
        '<span class="file-item-name">' + name + '</span>' +
        '<a class="file-item-link" href="' + link + '" target="_blank">Скачать</a>';
      fileList.prepend(item);
    }
  </script>
</body>

</html>

<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>Компании — miniCRM</title>
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/nav.css">
</head>

<body>
    <div class="page">
        <div class="top-bar">
            <div class="page-title">Компании</div>
            <button class="btn btn-primary" id="btn-add">+ Добавить</button>
        </div>
        <div id="alert"></div>
        <div class="card-table">
            <div id="table-wrap">
                <div class="loading">Загрузка...</div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal">
            <div class="modal-title" id="modal-title">Компания</div>
            <div id="modal-alert"></div>
            <div class="form-group"><label>Название *</label><input type="text" id="f-name"
                    placeholder="Tech Solutions"></div>
            <div class="form-group"><label>Отрасль</label><input type="text" id="f-industry" placeholder="Технологии">
            </div>
            <div class="form-group"><label>Сайт</label><input type="url" id="f-website"
                    placeholder="https://example.com"></div>
            <div class="form-group"><label>Телефон</label><input type="text" id="f-phone"
                    placeholder="+7 777 000 00 00"></div>
            <div class="modal-footer">
                <button class="btn btn-outline" id="btn-cancel">Отмена</button>
                <button class="btn btn-primary" id="btn-save">Сохранить</button>
            </div>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/nav.js"></script>
    <script>
        requireAuth();
        renderNav("companies");

        let editId = null;

        async function load() {
            const wrap = document.getElementById("table-wrap");
            try {
                const list = await apiFetch("/companies");
                if (!list.length) { wrap.innerHTML = '<div class="empty">Компаний нет</div>'; return; }
                wrap.innerHTML =
                    '<table><thead><tr><th>Название</th><th>Отрасль</th><th>Сайт</th><th>Телефон</th><th>Добавлена</th><th></th></tr></thead>' +
                    '<tbody>' + list.map(c =>
                        '<tr>' +
                        '<td><strong>' + c.name + '</strong></td>' +
                        '<td>' + (c.industry || '—') + '</td>' +
                        '<td>' + (c.website ? '<a href="' + c.website + '" target="_blank" style="color:var(--primary)">' + c.website + '</a>' : '—') + '</td>' +
                        '<td>' + (c.phone || '—') + '</td>' +
                        '<td>' + formatDate(c.created_at) + '</td>' +
                        '<td style="display:flex;gap:6px">' +
                        '<button class="btn btn-outline" style="font-size:12px" onclick=\'openEdit(' + JSON.stringify(c) + ')\'>Ред.</button>' +
                        '<button class="btn btn-danger" style="font-size:12px" onclick="del(\'' + c.id + '\')">✕</button>' +
                        '</td></tr>'
                    ).join("") + '</tbody></table>';
            } catch { wrap.innerHTML = '<div class="empty">Ошибка загрузки</div>'; }
        }

        function openModal(title) {
            document.getElementById("modal-title").textContent = title;
            document.getElementById("modal-alert").innerHTML = "";
            document.getElementById("modal").classList.add("open");
        }

        document.getElementById("btn-add").onclick = () => {
            editId = null;
            ["f-name", "f-industry", "f-website", "f-phone"].forEach(id => document.getElementById(id).value = "");
            openModal("Новая компания");
        };

        function openEdit(c) {
            editId = c.id;
            document.getElementById("f-name").value = c.name || "";
            document.getElementById("f-industry").value = c.industry || "";
            document.getElementById("f-website").value = c.website || "";
            document.getElementById("f-phone").value = c.phone || "";
            openModal("Редактировать компанию");
        }

        document.getElementById("btn-cancel").onclick = () => document.getElementById("modal").classList.remove("open");

        document.getElementById("btn-save").onclick = async () => {
            const body = {
                name: document.getElementById("f-name").value,
                industry: document.getElementById("f-industry").value || null,
                website: document.getElementById("f-website").value || null,
                phone: document.getElementById("f-phone").value || null,
            };
            const ma = document.getElementById("modal-alert");
            try {
                if (editId) {
                    await apiFetch("/companies/" + editId, { method: "PUT", body: JSON.stringify(body) });
                } else {
                    await apiFetch("/companies", { method: "POST", body: JSON.stringify(body) });
                }
                document.getElementById("modal").classList.remove("open");
                load();
            } catch (err) {
                const d = err.data?.errors;
                showAlert(ma, Array.isArray(d) ? d.map(e => e.message).join(", ") : err.data?.error || "Ошибка");
            }
        };

        async function del(id) {
            if (!confirm("Удалить компанию?")) return;
            try { await apiFetch("/companies/" + id, { method: "DELETE" }); load(); }
            catch { showAlert(document.getElementById("alert"), "Не удалось удалить"); }
        }

        load();
    </script>
</body>

</html>
